<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>局所的な法則から全体を記述する — 2 次元流体デモ</title>
  <link rel="stylesheet" href="../../assets/css/course.css" />
  <link rel="stylesheet" href="./fluid.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <p class="site-eyebrow">数理科学 I / 第 3 回</p>
      <h1 class="site-title">局所的な法則から全体を記述する — 2 次元流体デモ</h1>
      <p class="site-lead">
        各格子点での局所的な更新を，時空間上に積み重ねることで，流れ全体のふるまいが現れます．
        このデモでは，近くの値を使った更新が全体の運動につながる様子を観察できます．
      </p>
    </div>
  </header>

  <main class="container site-main">

    <section class="panel">
      <div class="panel-header">
        <h2>デモ</h2>
        <p>
          キャンバス上をドラッグすると，その場所に速度と染料が加わります．
        </p>
      </div>
      <div class="panel-body">
        <div class="toolbar-grid">
          <div class="toolbar-group">
            <span class="toolbar-label">表示</span>
            <div class="segmented" role="group" aria-label="表示モード">
              <button class="button button-subtle mode-button is-active" type="button" data-mode="dye">染料</button>
              <button class="button button-subtle mode-button" type="button" data-mode="velocity">速度</button>
              <button class="button button-subtle mode-button" type="button" data-mode="divergence">発散</button>
              <button class="button button-subtle mode-button" type="button" data-mode="pressure">圧力</button>
            </div>
          </div>

          <div class="toolbar-group">
            <span class="toolbar-label">操作</span>
            <div class="segmented" role="group" aria-label="操作">
              <button class="button" type="button" id="toggleRunButton">一時停止</button>
              <button class="button button-subtle" type="button" id="stepButton">1 ステップ進める</button>
              <button class="button button-subtle" type="button" id="resetButton">初期状態に戻す</button>
            </div>
          </div>

          <div class="toolbar-group toolbar-group-inline">
            <label class="checkbox-chip">
              <input type="checkbox" id="showArrowsCheckbox" checked />
              <span>表示に速度を表す矢印を重ねる</span>
            </label>
          </div>
        </div>

        <div class="sim-layout">
          <div class="sim-stage">
            <div class="sim-surface" id="simSurface">
              <canvas id="glCanvas" aria-label="2 次元流体シミュレーション"></canvas>
              <canvas id="overlayCanvas" aria-hidden="true"></canvas>
              <div class="unsupported-message" id="unsupportedMessage" hidden>
                このブラウザでは必要な WebGL 機能が利用できないため，デモを開始できませんでした．
              </div>
            </div>
          </div>

          <div class="info-strip sim-info-strip">
            <article class="lesson-card info-card" hidden>
              <div class="label">現在の表示</div>
              <div class="value" id="modeValue">染料</div>
            </article>
            <article class="lesson-card info-card" hidden>
              <div class="label">シミュレーション状態</div>
              <div class="value" id="statusValue">実行中</div>
            </article>
            <article class="lesson-card info-card">
              <div class="label">格子解像度</div>
              <div class="value" id="gridValue">---</div>
            </article>
            <article class="lesson-card info-card info-card-wide" hidden>
              <div class="label">局所計算の見方</div>
              <div class="value value-multi" id="ruleValue">
                近くのセルとの違いを使って，局所的に状態を更新します．
              </div>
            </article>
          </div>
        </div>

        <!-- <p class="small-note note-space">
          速度矢印は，内部で計算されている速度場を粗い格子で抜き出して表示したものです．
          発散モードでは赤が「湧き出し」，青が「吸い込み」を表します．
          圧力モードでは，発散を小さくするための補正量の分布を見ています．
        </p> -->
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-actions">
        <a class="button button-subtle" href="../index.html">第 3 回のページへ戻る</a>
      </div>
    </div>
  </footer>

  <script src="./main.js"></script>
</body>
</html>
